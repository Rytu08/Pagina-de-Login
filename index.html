<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <!-- Configurações básicas da página -->
     <meta charset="UTF-8">
     <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <title>Login</title>
     
     <!-- Bootstrap (estilização pronta) -->
      <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      crossorigin="anonymous">
      
      <!-- Ícones (usado no botão de voltar e olho da senha) -->
       <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
       
       <!-- Fonte personalizada -->
        <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
        
        <!-- CSS externo -->
         <link rel="stylesheet" href="style.css">
        </head>
        
        <body>
            
            <!-- Container principal -->
             <div class="container-login">
                
                <!-- Caixa de login -->
                 <div class="login-box" id="loginBox">
                    
                    <!-- Título inicial -->
                     <h2 id="titleLogin">FAZER<br>LOGIN</h2>
                     
                     <!-- Botão começar -->
                      <button id="btnStart" class="btn-expand animado" onclick="expandLogin()">COMEÇAR</button>
                    </div>
                    
                    <!-- Área da imagem -->
                     <div class="image-box" id="imageBox">
                        <img src="Imagem.jpg" alt="Imagem de login">
                    </div>
                </div>
                
                <!-- Script externo -->
                 <script src="script.js"></script>
                </body>
                </html>
